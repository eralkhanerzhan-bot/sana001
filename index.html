<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaNa Олимпиада · 5-сынып Математика</title>
<style>
:root{
  --blue:#3498db;
  --darkblue:#2c3e50;
  --yellow:#f39c12;
  --green:#27ae60;
  --bg:#ecf8ff;
  --card:#ffffff;
  --text:#2c3e50;
  --muted:#7f8c8d;
  --shadow:0 8px 24px rgba(52,152,219,.15);
  --line:rgba(52,152,219,.2);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Segoe UI',Tahoma,Arial,sans-serif;
  color:var(--text);
  background:linear-gradient(135deg,#e3f4ff 0%, #ffffff 100%);
  min-height:100vh;
}
.wrap{max-width:980px;margin:auto;padding:20px}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  padding:16px 20px;
  background:var(--card);
  border-radius:20px;
  box-shadow:var(--shadow);
  border:2px solid var(--line);
  margin-bottom:20px;
}
.brand{display:flex;align-items:center;gap:16px}
.brandIcon{
  width:70px;
  height:70px;
  border-radius:50%;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 12px rgba(52,152,219,.2);
  overflow:hidden;
}
.brandIcon img{width:100%;height:100%;object-fit:cover}
.brandTitle{font-weight:900;font-size:18px;color:var(--darkblue)}
.brandSub{font-size:13px;color:var(--muted);margin-top:3px}

.card{
  background:var(--card);
  padding:24px;
  border-radius:20px;
  box-shadow:var(--shadow);
  border:2px solid var(--line);
}
h1{margin:0 0 8px;font-size:26px;color:var(--darkblue)}
h2{margin:0;font-size:22px;color:var(--darkblue)}
.muted{color:var(--muted);font-size:14px}
.tip{margin-top:12px;padding:12px;background:rgba(52,152,219,.08);border-radius:12px;border-left:4px solid var(--blue)}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:16px;
}
@media(max-width:760px){.grid2{grid-template-columns:1fr}}

.field label{font-weight:700;display:block;margin-bottom:6px;color:var(--darkblue)}
.field input{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:2px solid var(--line);
  outline:none;
  background:#f8fcff;
  transition:.2s;
  font-size:15px;
}
.field input:focus{border-color:var(--blue);background:#fff}

.btnrow{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}
button{
  border:0;
  padding:13px 20px;
  border-radius:14px;
  font-weight:900;
  cursor:pointer;
  font-size:15px;
  transition:.2s;
  color:#fff;
  background:linear-gradient(135deg,var(--blue),#5dade2);
  box-shadow:0 6px 16px rgba(52,152,219,.25);
}
button:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(52,152,219,.35)}
button.secondary{
  background:rgba(52,152,219,.12);
  color:var(--darkblue);
  box-shadow:none;
}
button:disabled{opacity:.5;cursor:not-allowed}

.headrow{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  flex-wrap:wrap;
}
.timer{
  padding:11px 16px;
  border-radius:14px;
  background:linear-gradient(135deg,#fff3cd,#ffe082);
  font-weight:900;
  border:2px solid var(--yellow);
  color:#856404;
  font-size:15px;
}

.progress-container{
  width:100%;
  height:10px;
  background:#e3f4ff;
  border-radius:10px;
  overflow:hidden;
  margin-top:20px;
}
.progress-bar{
  height:100%;
  background:linear-gradient(90deg,var(--blue),var(--green));
  transition:width 0.3s ease;
  width:0%;
}
.progress-text{
  text-align:center;
  margin-top:8px;
  font-weight:700;
  color:var(--darkblue);
  font-size:15px;
}

.qcard{
  margin-top:20px;
  padding:24px;
  border-radius:16px;
  background:linear-gradient(135deg,#f0f9ff 0%, #ffffff 100%);
  border:2px solid rgba(52,152,219,.15);
  min-height:300px;
}
.qtitle{
  font-weight:800;
  margin-bottom:20px;
  font-size:19px;
  line-height:1.6;
  color:var(--darkblue);
}
.opt{
  display:flex;
  gap:12px;
  padding:14px 16px;
  border-radius:12px;
  background:#f8fcff;
  margin-top:12px;
  border:2px solid rgba(52,152,219,.12);
  cursor:pointer;
  transition:.2s;
}
.opt:hover{background:#e3f4ff;border-color:var(--blue)}
.opt.selected{
  background:#d4edda;
  border-color:var(--green);
}
.opt input{margin-top:4px;cursor:pointer}
.opt b{font-size:17px;color:var(--darkblue)}
.opt div{font-size:17px;color:var(--text)}

.nav-buttons{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
  gap:12px;
}
.nav-buttons button{
  flex:1;
  max-width:200px;
}

.q-navigator{
  margin-top:24px;
  padding:18px;
  background:#f8fcff;
  border-radius:14px;
  border:2px solid var(--line);
}
.q-nav-title{
  font-weight:700;
  margin-bottom:12px;
  color:var(--darkblue);
}
.q-nav-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(45px, 1fr));
  gap:8px;
}
.q-nav-btn{
  padding:10px;
  border-radius:8px;
  background:#fff;
  border:2px solid var(--line);
  text-align:center;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
  font-size:14px;
  color:var(--text);
}
.q-nav-btn:hover{
  background:#e3f4ff;
  border-color:var(--blue);
}
.q-nav-btn.answered{
  background:#d4edda;
  border-color:var(--green);
  color:var(--green);
}
.q-nav-btn.current{
  background:var(--blue);
  color:#fff;
  border-color:var(--blue);
}

.final{
  margin-top:18px;
  padding:20px;
  border-radius:16px;
  background:#f0f9ff;
  border:2px solid rgba(52,152,219,.2);
}
.footer{
  margin-top:18px;
  text-align:center;
  color:var(--muted);
  font-size:13px;
}

.frac{
  display:inline-block;
  text-align:center;
  vertical-align:middle;
  font-size:17px;
  line-height:1.1;
  margin:0 3px;
}
.frac .top{
  display:block;
  border-bottom:2px solid var(--darkblue);
  padding:0 5px;
}
.frac .bottom{
  display:block;
  padding:0 5px;
}
</style>
</head>
<body>

<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <div class="brandIcon">
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%233498db'/%3E%3Ctext x='50' y='65' font-size='40' font-weight='bold' text-anchor='middle' fill='white'%3ESN%3C/text%3E%3C/svg%3E" alt="SaNa">
      </div>
      <div>
        <div class="brandTitle">SaNa · Оқу орталығы</div>
        <div class="brandSub">Олимпиада · 5-сынып Математика</div>
      </div>
    </div>
  </div>

  <div id="screenStart" class="card">
    <h1>Математика олимпиадасы</h1>
    <p class="muted">Толық аты-жөніңізді, сыныбыңызды және мектебіңізді енгізіңіз.</p>
    <div class="grid2">
      <div class="field">
        <label>Тегі</label>
        <input id="surname" placeholder="Мысалы: Сейтов" autocomplete="off">
      </div>
      <div class="field">
        <label>Аты</label>
        <input id="name" placeholder="Мысалы: Нұрсұлтан" autocomplete="off">
      </div>
      <div class="field">
        <label>Сынып</label>
        <input id="grade" placeholder="Мысалы: 5А" autocomplete="off">
      </div>
      <div class="field">
        <label>Мектеп</label>
        <input id="school" placeholder="Мысалы: №15 мектеп" autocomplete="off">
      </div>
      <div class="field">
        <label>Ата-ананың телефон нөмірі</label>
        <input id="parentPhone" placeholder="Мысалы: +77771234567" autocomplete="off">
      </div>
    </div>
    <div class="btnrow">
      <button id="btnStart" type="button">Тестті бастау</button>
    </div>
    <div class="muted tip">⚠️ Тест басталғаннан кейін 60 минут таймер жүреді.</div>
  </div>

  <div id="screenTest" style="display:none;">
    <div class="card">
      <div class="headrow">
        <div>
          <h2>Олимпиада SANA</h2>
          <div id="who" class="muted"></div>
        </div>
        <div class="timer">⏱ Қалған уақыт: <b id="timeLeft">00:00</b></div>
      </div>

      <div class="progress-container">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <div class="progress-text">Сұрақ <span id="currentQ">1</span> / 40</div>

      <div id="questionCard" class="qcard"></div>

      <div class="nav-buttons">
        <button id="btnPrev" type="button" class="secondary">← Артқа</button>
        <button id="btnNext" type="button">Алдыға →</button>
      </div>

      <div class="q-navigator">
        <div class="q-nav-title">Барлық сұрақтар:</div>
        <div id="qNav" class="q-nav-grid"></div>
      </div>

      <div class="btnrow" style="margin-top:20px;">
        <button id="btnFinish" type="button">Тестті аяқтау</button>
        <button id="btnReset" type="button" class="secondary">Қайта бастау</button>
      </div>

      <div id="status" class="muted" style="margin-top:12px;"></div>
      <div id="final" class="final" style="display:none;"></div>
      <div class="footer">
        SaNa Оқу орталығы · Олимпиада
      </div>
    </div>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwAnXudBOyZ8xaMbbEpGPNP_VDTbnI3741W9lVWlJkhrPyulNZEdI5Bo54fyElQ3paQ_w/exec";
const TEST_MINUTES = 60;
const TEST_NAME = "Олимпиада SANA · 5-сынып";

const questions = [
  {id:"q1",t:`1. Теңдеуді шешіңіз: 9(x - 16) = 126`,a:{A:"35",B:"40",C:"30",D:"25"},c:"C"},
  {id:"q2",t:`2. Салыстыр: 692 кг □ 6,93 н; 60 минут □ 1 сағ; 20 күн □ 3 тәулік`,a:{A:"<; =; >",B:"<; =; <",C:">; <; =",D:">; =; <"},c:"D"},
  {id:"q3",t:`3. Мәнін тап: 4<span class="frac"><span class="top">1</span><span class="bottom">2</span></span> + 51<span class="frac"><span class="top">1</span><span class="bottom">2</span></span> - <span class="frac"><span class="top">12</span><span class="bottom">2</span></span>`,a:{A:"50",B:`<span class="frac"><span class="top">971</span><span class="bottom">18</span></span>`,C:"56",D:"51"},c:"A"},
  {id:"q4",t:`4. Бассейнге Серік 3 күнде бір рет, Берік 4 күнде бір рет, ал Болат 5 күнде бір рет барады. Олар осы дүйсенбі күні бассейнде барлығы кездесті. Антаның қай күнінде олар қайталан кездеседі?`,a:{A:"Жұма",B:"Сенбі",C:"Дүйсенбі",D:"Жексенбі"},c:"A"},
  {id:"q5",t:`5. Қазір Алмастың жасы 18-ге, ал әжесі 48-де. Неше жылдан соң әжесі олан екі есе үлкен болады?`,a:{A:"12",B:"13",C:"14",D:"Анықтау мүмкін емес"},c:"A"},
  {id:"q6",t:`6. Үш санның қосындысы 500-ге тең. Бірінші сан қосындының бестен бір бөлігі, ал екінші сан қосындының төрттен бір бөлігі, үшінші санды тап.`,a:{A:"225",B:"300",C:"275",D:"400"},c:"C"},
  {id:"q7",t:`7. Ондықтарға дейін дөңгелексе: 10,541; 141,168; 0,595`,a:{A:"10,5; 141,2; 0,5",B:"11,5; 141,2; 0,5",C:"10,5; 141,3; 0,5",D:"10,5; 141,2; 0,6"},c:"A"},
  {id:"q8",t:`8. Кітапта 120 бет бар. Бала кітаптың сегізден жеті бөлігін оқылды. Бала қанша бет оқылды?`,a:{A:"15",B:"48",C:"60",D:"105"},c:"D"},
  {id:"q9",t:`9. Төмендегі тізбектің келесі мүшесін тап: 1,2,6,24,120,...`,a:{A:"720",B:"400",C:"100",D:"105"},c:"A"},
  {id:"q10",t:`10. Өрнекті ықшамдаңдар: 12a+20(15a+c)-30(10a+c)`,a:{A:"2(6a-5c)",B:"12a-5c",C:"10a+12c",D:"10a+12c=10"},c:"A"},
  {id:"q11",t:`11. Кітаптан 20 парақ біріліп жыртылды. Жыртылған парақтарының нөмірлерінің қосындысы қандай сан?`,a:{A:"тақ",B:"жұп",C:"тақ та, жұп та болуы мүмкін",D:"мағлұмат жеткіліксіз"},c:"C"},
  {id:"q12",t:`12. Тіктөртбұрыштың ұзындығы 150 м, ені 80 дм. Ауданын тап.`,a:{A:"1200м²",B:"12000см²",C:"12000м²",D:"120000см²"},c:"A"},
  {id:"q13",t:`13. Теңдеуді шеш: x ÷ 10<span class="frac"><span class="top">3</span><span class="bottom">4</span></span> = <span class="frac"><span class="top">8</span><span class="bottom">43</span></span>`,a:{A:`<span class="frac"><span class="top">2</span><span class="bottom">11</span></span>`,B:"2",C:`<span class="frac"><span class="top">44</span><span class="bottom">17</span></span>`,D:"6"},c:"B"},
  {id:"q14",t:`14. Есепті шешіңіз. Сәукесе 108 кәмпит болды. Әзізат оның <span class="frac"><span class="top">5</span><span class="bottom">9</span></span> бөлігін жеп қойды. Әзізат қанша кәмпит жеп қойды?`,a:{A:"10",B:"36",C:"44",D:"46"},c:"C"},
  {id:"q15",t:`15. Есепті мәнін тап: a÷<span class="frac"><span class="top">9</span><span class="bottom">17</span></span> + a, егер a = <span class="frac"><span class="top">306</span><span class="bottom">17</span></span>`,a:{A:"15",B:`<span class="frac"><span class="top">a</span><span class="bottom">1</span></span>`,C:`<span class="frac"><span class="top">3</span><span class="bottom">43</span></span>`,D:`<span class="frac"><span class="top">a</span><span class="bottom">23</span></span>`},c:"A"},
  {id:"q16",t:`16. Автотрактаның барлығы 120 машина бар. Оның <span class="frac"><span class="top">5</span><span class="bottom">6</span></span>-і автобустар. Ал қалғанының <span class="frac"><span class="top">2</span><span class="bottom">3</span></span> жеңіл машина. Автотрактаға қанша жеңіл машина бар?`,a:{A:"75",B:"68",C:"65",D:"40"},c:"B"},
  {id:"q17",t:`17. Ондық бөлшекке айналдыр: 2<span class="frac"><span class="top">11</span><span class="bottom">100</span></span>; 853<span class="frac"><span class="top">1</span><span class="bottom">10</span></span>; 31<span class="frac"><span class="top">2</span><span class="bottom">5</span></span>`,a:{A:"2,11; 853,01; 31,2",B:"2,11; 863,1; 31,4",C:"2,1; 863,10; 31,25",D:"2,11; 853,1; 31,4"},c:"D"},
  {id:"q18",t:`18. Салдарлың қатарын жалғастырыңыз: 1,3,9,27,81,...`,a:{A:"90",B:"256",C:"80",D:"243"},c:"D"},
  {id:"q19",t:`19. Бұрыс бөлшекке айналдыр: 102,5; 10<span class="frac"><span class="top">1</span><span class="bottom">5</span></span>; 14,068`,a:{A:`<span class="frac"><span class="top">1025</span><span class="bottom">10</span></span>; <span class="frac"><span class="top">25</span><span class="bottom">5</span></span>; <span class="frac"><span class="top">14068</span><span class="bottom">1000</span></span>`,B:`<span class="frac"><span class="top">102</span><span class="bottom">10</span></span>; <span class="frac"><span class="top">8</span><span class="bottom">5</span></span>; <span class="frac"><span class="top">7068</span><span class="bottom">1000</span></span>`,C:`<span class="frac"><span class="top">1025</span><span class="bottom">10</span></span>; <span class="frac"><span class="top">51</span><span class="bottom">5</span></span>; <span class="frac"><span class="top">14068</span><span class="bottom">1000</span></span>`,D:`<span class="frac"><span class="top">430</span><span class="bottom">10</span></span>; <span class="frac"><span class="top">1</span><span class="bottom">5</span></span>; <span class="frac"><span class="top">7068</span><span class="bottom">1000</span></span>`},c:"C"},
  {id:"q20",t:`20. 100 литрлік шелек 25%-ға толы. Шелекті толтыру үшін қанша литр су құю керек?`,a:{A:"70л",B:"205л",C:"40л",D:"75л"},c:"D"},
  {id:"q21",t:`21. Арифметикалық орташа мәнді табыңыз 100, 200, 1200.`,a:{A:"540",B:"670",C:"580",D:"500"},c:"D"},
  {id:"q22",t:`22. Мына сандардың қайсысы жай сан болып табылады: 1001, 1002, 1005, 1009`,a:{A:"1001",B:"1002",C:"1005",D:"1009"},c:"D"},
  {id:"q23",t:`23. Құбтың қанша жағы, қыры және төбесі бар?`,a:{A:"8; 6; 12",B:"12; 8; 6",C:"12; 6; 8",D:"6; 12; 8"},c:"D"},
  {id:"q24",t:`24. Сыныпта 40 оқушы бар. Бүгін 2 адам сабаққа келмеген. Сынып оқушыларының қандай бөлігі сабаққа жоқ?`,a:{A:`<span class="frac"><span class="top">1</span><span class="bottom">20</span></span>`,B:`<span class="frac"><span class="top">1</span><span class="bottom">12</span></span>`,C:"3",D:`<span class="frac"><span class="top">1</span><span class="bottom">8</span></span>`},c:"A"},
  {id:"q25",t:`25. Машинистта 120 парақ қағаз бар. Ол алдымен барлық қағаздың үштен бірін, одан кейін қалған қағаздың төрттен бірін жұмысқа пайдаланады. Машинист неше парақ қағаз пайдаланды?`,a:{A:"80",B:"60",C:"83",D:"26"},c:"B"},
  {id:"q26",t:`26. Арай, Малика, және Ойсерім кинотеатрға жаңа барады. Ойсерім әр 3-ші, Малика әр 7-ші, ал Арай әр 6-ның күн барады. Бүгін кинола барлық қызлар болды. Үш қыз келесі рет қашан тағы да бірге кездеседі?`,a:{A:"72",B:"21",C:"42",D:"12"},c:"C"},
  {id:"q27",t:`27. Есептеңіз: 215-659-(54-44)+263+45+146`,a:{A:"71",B:"17",C:"9",D:"0"},c:"D"},
  {id:"q28",t:`28. Тауар құны 5000 тг болған. Оны бестен бір бөлікке арттырып, сосын жаңа бағаны оның бір бөлікке кемітті. Тауарлың жаңа құнын тап.`,a:{A:"7054",B:"5200",C:"5400",D:"5470"},c:"C"},
  {id:"q29",t:`29. 1,2,3,4 цифрлары арқылы жазылған неше төрт таңбалы сан бар. Цифрлар қайталанбау керек`,a:{A:"15",B:"16",C:"14",D:"24"},c:"D"},
  {id:"q30",t:`30. Төмендегі өрнектердің қайсысы n натурал саны үшін жұп сан болады?`,a:{A:"2n+1",B:"2n",C:"n-1",D:"n+100"},c:"B"},

let currentQuestion=0,answers={},timerId=null,submitted=false,startedAtMs=null,plannedEndAtMs=null;
const el=id=>document.getElementById(id);

function renderQuestion(){
  const q=questions[currentQuestion],card=el("questionCard");
  card.innerHTML=`<div class="qtitle">${q.t}</div>${Object.keys(q.a).map(k=>`<label class="opt ${answers[q.id]===k?'selected':''}" data-key="${k}"><input type="radio" name="${q.id}" value="${k}" ${answers[q.id]===k?'checked':''}><div><b>${k})</b> ${q.a[k]}</div></label>`).join("")}`;
  card.querySelectorAll('.opt').forEach(opt=>{opt.addEventListener('click',function(){answers[q.id]=this.dataset.key;renderQuestion();updateNavigator();updateProgress()})});
  el("btnPrev").disabled=currentQuestion===0;
  el("btnNext").textContent=currentQuestion===questions.length-1?"Соңғы сұрақ":"Алдыға →";
  el("currentQ").textContent=currentQuestion+1;
  updateProgress();updateNavigator()
}
function updateProgress(){el("progressBar").style.width=((currentQuestion+1)/questions.length)*100+"%"}
function updateNavigator(){
  const nav=el("qNav");nav.innerHTML="";
  questions.forEach((q,i)=>{
    const btn=document.createElement("div");
    btn.className="q-nav-btn";
    if(answers[q.id])btn.classList.add("answered");
    if(i===currentQuestion)btn.classList.add("current");
    btn.textContent=i+1;
    btn.addEventListener("click",()=>{currentQuestion=i;renderQuestion()});
    nav.appendChild(btn)
  })
}
function startTimer(){
  const total=TEST_MINUTES*60;
  startedAtMs=Date.now();plannedEndAtMs=startedAtMs+total*1000;
  el("timeLeft").textContent=fmtTime(total);
  if(timerId)clearInterval(timerId);
  timerId=setInterval(()=>{
    const left=Math.max(0,Math.ceil((plannedEndAtMs-Date.now())/1000));
    el("timeLeft").textContent=fmtTime(left);
    if(left<=0){clearInterval(timerId);timerId=null;submit("⏳ Уақыт аяқталды. Тест автоматты түрде аяқталды.")}
  },250)
}
function fmtTime(sec){return String(Math.floor(sec/60)).padStart(2,"0")+":"+String(sec%60).padStart(2,"0")}
function pad2(n){return String(n).padStart(2,"0")}
function fmtDateTime(d){return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`}
async function saveToSheet(payload){await fetch(WEB_APP_URL,{method:"POST",mode:"no-cors",body:new URLSearchParams(payload)})}
function lockInputs(){document.querySelectorAll('input[type="radio"]').forEach(r=>r.disabled=true);el("btnFinish").disabled=true;el("btnPrev").disabled=true;el("btnNext").disabled=true}
function showConfirmDialog(){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999';
  const dialog=document.createElement('div');
  dialog.style.cssText='background:white;padding:30px;border-radius:20px;max-width:450px;box-shadow:0 20px 60px rgba(0,0,0,0.3)';
  dialog.innerHTML=`<h2 style="margin:0 0 20px;color:#2c3e50;font-size:22px">Тестті аяқтауға сенімдісіз бе?</h2><p style="color:#7f8c8d;margin-bottom:25px">Растау үшін есепті шешіңіз:</p><div style="background:#f0f9ff;padding:20px;border-radius:12px;margin-bottom:20px;border:2px solid #3498db"><p style="font-size:20px;font-weight:700;color:#2c3e50;margin:0 0 15px">1 + 1 = ?</p><input type="number" id="mathAnswer" placeholder="Жауапты енгізіңіз" style="width:100%;padding:12px;border:2px solid #e3f4ff;border-radius:10px;font-size:16px;outline:none"></div><div style="display:flex;gap:12px"><button id="confirmNo" style="flex:1;padding:12px;background:#ecf0f1;color:#2c3e50;border:0;border-radius:12px;font-weight:700;cursor:pointer;font-size:15px">Жоқ, жалғастыру</button><button id="confirmYes" style="flex:1;padding:12px;background:linear-gradient(135deg,#3498db,#5dade2);color:white;border:0;border-radius:12px;font-weight:700;cursor:pointer;font-size:15px">Иә, аяқтау</button></div>`;
  overlay.appendChild(dialog);document.body.appendChild(overlay);
  const input=dialog.querySelector('#mathAnswer');input.focus();
  dialog.querySelector('#confirmNo').addEventListener('click',()=>document.body.removeChild(overlay));
  dialog.querySelector('#confirmYes').addEventListener('click',()=>{
    const answer=input.value.trim();
    if(answer!=="2"){input.style.borderColor="#e74c3c";input.value="";input.placeholder="Қате! Қайталап көріңіз";return}
    document.body.removeChild(overlay);submit("")
  });
  input.addEventListener('keypress',e=>{if(e.key==='Enter')dialog.querySelector('#confirmYes').click()})
}
function showResult(student,score,reasonText){
  const final=el("final");final.style.display="block";
  final.innerHTML=`${reasonText?`<div class="muted">${reasonText}</div><hr style="border:0;border-top:1px solid rgba(0,0,0,.08);margin:12px 0">`:""}
<div style="text-align:center;padding:30px 20px"><div style="font-size:72px;margin-bottom:10px">🎉</div><h2 style="margin:0 0 10px;color:#2c3e50;font-size:24px">Тест аяқталды!</h2><div style="margin:20px 0"><div style="font-size:16px;color:#7f8c8d;margin-bottom:8px">Оқушы:</div><div style="font-size:18px;font-weight:700;color:#2c3e50">${student.surname} ${student.name}</div><div style="font-size:14px;color:#7f8c8d;margin-top:4px">${student.grade} · ${student.school}</div></div><div style="background:linear-gradient(135deg,#e3f4ff,#d4edda);padding:25px;border-radius:16px;margin:20px 0;border:2px solid #27ae60"><div style="font-size:18px;color:#27ae60;font-weight:700;margin-bottom:8px">Нәтиже</div><div style="font-size:48px;font-weight:900;color:#2c3e50">${score}<span style="font-size:32px;color:#7f8c8d"> / ${questions.length}</span></div><div style="font-size:16px;color:#7f8c8d;margin-top:8px">${Math.round((score/questions.length)*100)}% дұрыс</div></div><div style="font-size:14px;color:#7f8c8d">Нәтижелер жіберілді</div></div>`
}
async function submit(reasonText=""){
  if(submitted)return;submitted=true;
  const finishedAtMs=Date.now(),startedAt=startedAtMs?new Date(startedAtMs):new Date(),finishedAt=new Date(finishedAtMs),spentSec=startedAtMs?Math.max(0,Math.round((finishedAtMs-startedAtMs)/1000)):0;
  if(timerId){clearInterval(timerId);timerId=null}
  const student={surname:el("surname").value.trim(),name:el("name").value.trim(),grade:el("grade").value.trim(),school:el("school").value.trim(),parentPhone:el("parentPhone").value.trim()};
  let score=0;questions.forEach(q=>{if(answers[q.id]===q.c)score++});
  const pickedKey=questions.map(q=>answers[q.id]||"").join(""),answerKey=questions.map(q=>q.c).join("");
  lockInputs();showResult(student,score,reasonText);
  el("status").textContent="Google таблицаға жіберілуде...";
  try{await saveToSheet({test:TEST_NAME,surname:student.surname,name:student.name,klass:student.grade,school:student.school,parentPhone:student.parentPhone,score:String(score),total:String(questions.length),startedAt:fmtDateTime(startedAt),finishedAt:fmtDateTime(finishedAt),spentSec:String(spentSec),pickedKey,answerKey});el("status").innerHTML='<b style="color:#27ae60">✅ Жіберілді</b>'}catch(e){el("status").innerHTML='<b style="color:#c0392b">❌ Жіберілмеді</b>'}
}
function resetAll(){submitted=false;currentQuestion=0;answers={};if(timerId){clearInterval(timerId);timerId=null}startedAtMs=null;plannedEndAtMs=null;el("status").textContent="";el("final").style.display="none";el("final").innerHTML="";el("screenTest").style.display="none";el("screenStart").style.display="block"}
function startTest(){
  const surname=el("surname").value.trim(),name=el("name").value.trim(),grade=el("grade").value.trim(),school=el("school").value.trim(),parentPhone=el("parentPhone").value.trim();
  if(!surname||!name||!grade||!school||!parentPhone){alert("Барлық өрістерді толтырыңыз!");return}
  el("screenStart").style.display="none";el("screenTest").style.display="block";el("who").textContent=`${surname} ${name} · ${grade} · ${school}`;
  renderQuestion();updateNavigator();startTimer()
}
el("btnStart").addEventListener("click",startTest);
el("btnPrev").addEventListener("click",()=>{if(currentQuestion>0){currentQuestion--;renderQuestion()}});
el("btnNext").addEventListener("click",()=>{if(currentQuestion<questions.length-1){currentQuestion++;renderQuestion()}});
el("btnFinish").addEventListener("click",showConfirmDialog);
el("btnReset").addEventListener("click",resetAll);
</script>
